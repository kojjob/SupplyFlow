# Async adapter only works within the same process, so for manually triggering cable updates from a console,
# and seeing results in the browser, you must do so from the web console (running inside the dev process),
# not a terminal started via bin/rails console! Add "console" to any action or any ERB template view
# to make the web console appear.
development:
  adapter: solid_cable
  # Optional: Add connects_to if you have a separate DB for cable in dev, otherwise it uses the main DB.
  # connects_to:
  #   database:
  #     writing: cable_dev # Or your development database alias for cable
  # polling_interval: 0.1.seconds # Optional, defaults are usually fine for dev
  # message_retention: 1.day # Optional

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
